<header class="shadow-md p-3 w-full h-18 fixed top-0 bg-white z-50">
  <div class="flex items-center justify-between mx-auto">
    <img routerLink="/" src="images/logo.png" alt="app logo" class="max-h-12 cursor-pointer" />
    <nav class="flex gap-6 my-2 uppercase text-xl">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/shop" routerLinkActive="active">Products</a>
        <a routerLink="/test-error" routerLinkActive="active">Errors</a>
    </nav>
    <div class="flex items-center gap-3">
        <a matBadge="5" matBadgeSize="large" class="custom-badge mt-2 mr-2" href="#">
            <mat-icon>shopping_cart</mat-icon>
        </a>
        <button mat-stroked-button>Login</button>
        <button mat-stroked-button>Register</button>
    </div>
  </div>
</header>

@if (busyService.loading()) {
  <mat-progress-bar mode="indeterminate" class="fixed top-18 z-50"></mat-progress-bar>
}
