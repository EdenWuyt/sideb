@if (busyService.busyRequestCount() === 0) {
  <div class="max-w-6xl mx-auto mt-32 px-10 py-12 rounded-lg shadow-md w-full">
    <div class="flex flex-col items-center justify-center w-full">
      <mat-icon class="icon-display mb-6">{{ icon() }}</mat-icon>
      <p class="text-gray-500 text-lg font-semibold mb-4">{{ message() }}</p>
      <button mat-flat-button (click)="onAction()">
        {{ actionText() }}
      </button>
    </div>
  </div>
}
