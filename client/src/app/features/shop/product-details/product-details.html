@if (product(); as productDetails){
    <section class="py-8">
        <div class="max-w-6xl px-4 mx-auto">
            <div class="grid grid-cols-3 gap-8">
                <div class="col-span-1">
                    <img src="{{ productDetails.pictureUrl }}" alt="product image" class="w-full object-cover">  
                </div>
                <div class="col-span-2 flex flex-col gap-4">
                    <h1 class="text-2xl font-semibold">{{ productDetails.artist }} - {{ productDetails.name }}</h1>
                    <p class="text-2xl font-extrabold">{{ productDetails.price | currency }}</p>
                    <div class="flex items-center gap-4">
                        <button mat-flat-button class="min-h-14">
                            <mat-icon>shopping_cart</mat-icon>
                            Add to Cart
                        </button>
                        <mat-form-field appearance="outline" subscriptSizing="dynamic" >
                            <mat-label>Quantity</mat-label>
                            <input matInput type="number" min="1" value="1" step="1">
                        </mat-form-field>
                    </div>
                    <mat-divider class="my-6"></mat-divider>
                    <p class="text-gray-500">
                        <span class="font-semibold">Genre:</span>
                        {{ productDetails.genre }}
                    </p>
                    <p class="text-gray-500">
                        <span class="font-semibold">Label:</span>
                        {{ productDetails.label }}
                    </p>
                    <p class="text-gray-500">
                        <span class="font-semibold">Description:</span>
                        {{ productDetails.description }}
                    </p>
                </div>
            </div>
        </div>
    </section>
}
