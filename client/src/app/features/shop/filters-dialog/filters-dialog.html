<div>
    <h3 class="text-3xl text-center pt-6 mb-3">Filters</h3>
    <mat-divider></mat-divider>
    <div class="flex p-4">
        <div class="w-full">
            <h4 class="font-semibold text-xl mb-2">Genre</h4>
            <mat-selection-list [(ngModel)]="selectedGenres" [multiple]="true">
                 @for (genre of shopService.genres; track $index) {
                        <mat-list-option [value]="genre">{{ genre }}</mat-list-option>
                    }
            </mat-selection-list>
        </div>
    </div>
    <div class="flex justify-end p-4 gap-2">
        <button mat-stroked-button (click)="clearFilters()">Clear Filters</button>
        <button mat-flat-button (click)="applyFilters()">Apply Filters</button>
    </div>
</div>
