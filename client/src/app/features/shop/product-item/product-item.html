@if (product) {
    <mat-card appearence="raised">
        <img src="{{ product.pictureUrl }}" alt="image of {{ product.name }}" class="aspect-square w-full object-cover">
        <mat-card-content class="mt-2">
            <h2 class="font-semibold">{{ product.name }}</h2>
            <p>{{ product.artist }}</p>
            <p class="font-light">{{ product.price | currency }}</p>
        </mat-card-content>
        <mat-card-actions>
            <button mat-stroked-button class="w-full">
                <mat-icon>add_shopping_cart</mat-icon>
                Add to cart
            </button>
        </mat-card-actions>
    </mat-card>
}
