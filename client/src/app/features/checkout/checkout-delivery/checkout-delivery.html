<div class="w-full">
    <mat-radio-group 
        class="grid grid-cols-1 gap-4"
        [value]="cartService.selectedDeliveryMethod()"
        (change)="updateSelectedDeliveryMethod($event.value)"
    >
        @for (method of checkoutService.deliveryMethods(); track method.id) {
            <label class="p-3 border border-gray-200 rounded-lg cursor-pointer w-full hover:bg-blue-100">
                <mat-radio-button 
                    [value]="method" 
                    class="w-full"
                >
                    <div class="flex flex-col">
                        <strong>{{ method.shortName }} - {{ method.price | currency }}</strong>
                        <span class="text-sm text-gray-500">{{ method.description }}</span>
                    </div>
                </mat-radio-button>
            </label>
        }
    </mat-radio-group>
</div>
